name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check trading_dashboard/ apps/ tests/

      - name: Type check
        run: mypy trading_dashboard/ apps/ --ignore-missing-imports
        continue-on-error: true

      - name: Test
        run: pytest tests/ -v --cov=trading_dashboard --cov=apps --cov-report=term-missing
