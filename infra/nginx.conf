server {
    listen 80;
    server_name 46.224.149.54;

    # SSE and API endpoints — no buffering, long timeout
    location ~ ^/(api|fig)/ {
        proxy_pass http://127.0.0.1:8050;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Staging test proxy — strip /test/ prefix before forwarding to staging app
    # SSE-friendly: buffering off + long timeout for /api/ and /fig/ streams
    location ^~ /test/ {
        # remove leading /test/ so upstream sees e.g. /dashboard_shell.html
        rewrite ^/test/?(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8051/;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Everything else (production HTML, JS, CSS, static assets)
    location / {
        proxy_pass http://127.0.0.1:8050;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
